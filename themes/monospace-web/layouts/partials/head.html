<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<title>{{ .Title }} | {{ .Site.Title }}</title>

<meta name="generator" content="Hugo with Monospace Web Theme" />
{{ if .Params.Author }}<meta name="author" content="{{ .Params.Author }}" />{{ end }}
<link rel="canonical"  href="{{ .Permalink }}">

{{ $resetStyle := resources.Get "css/reset.css" | resources.Minify | resources.Fingerprint }}
<link rel="stylesheet" href="{{ $resetStyle.Permalink }}">
{{ $indexStyle := resources.Get "css/index.css" | resources.Minify | resources.Fingerprint }}
<link rel="stylesheet" href="{{ $indexStyle.Permalink }}">
